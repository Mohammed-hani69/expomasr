<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - لوحة تحكم معمار مصر 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #030b1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #0f1a2e;
      border: 1px solid #1e2d4a;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-card h1 {
      color: #d4af37;
      font-size: 22px;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-card p {
      color: #94a3b8;
      font-size: 13px;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      color: #cbd5e1;
      font-size: 13px;
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #030b1a;
      border: 1px solid #1e2d4a;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #d4af37;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #d4af37, #f5d77b);
      border: none;
      border-radius: 14px;
      color: #030b1a;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🔐 لوحة تحكم المشرف</h1>
    <p>معرض معمار مصر الرقمي 2026</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" name="username" required autocomplete="username" placeholder="admin">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn">تسجيل الدخول</button>
    </form>
  </div>
</body>
</html>
